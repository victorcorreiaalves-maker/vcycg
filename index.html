<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neymar na Copa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ffcc00;
            padding: 20px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        h2 {
            margin-top: 40px;
        }
        form {
            display: flex;
            flex-direction: column;
            max-width: 400px;
        }
        input, textarea {
            margin-bottom: 10px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px;
            font-size: 16px;
            background-color: #00a859;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #007a3d;
        }
        ul {
            list-style-type: square;
        }
    </style>
</head>
<body>
    <header>
        <h1>Neymar vai para a Copa!</h1>
    </header>

    <main>
        <section>
            <h2>Notícias Recentes</h2>
            <ul id="news-list"></ul>
        </section>

        <section>
            <h2>Comente sobre Neymar</h2>
            <form id="comment-form">
                <input type="text" id="name" placeholder="Seu nome" required>
                <textarea id="comment" placeholder="Seu comentário" required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>

    <script>
        // Lista de notícias
        const news = [
            "Neymar confirmado na seleção para a Copa!",
            "Treinos intensos antes da estreia na Copa.",
            "Fãs esperam grande desempenho de Neymar."
        ];

        const newsList = document.getElementById("news-list");
        news.forEach(item => {
            const li = document.createElement("li");
            li.textContent = item;
            newsList.appendChild(li);
        });

        // Formulário de comentários
        const form = document.getElementById("comment-form");
        form.addEventListener("submit", function(e){
            e.preventDefault();

            const name = document.getElementById("name").value;
            const comment = document.getElementById("comment").value;

            // Aqui você enviaria os dados para um PHP/MySQL
            // Exemplo de fetch:
            /*
            fetch("salvar_comentario.php", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `name=${encodeURIComponent(name)}&comment=${encodeURIComponent(comment)}`
            })
            .then(response => response.text())
            .then(data => alert(data))
            .catch(err => alert("Erro ao enviar comentário"));
            */

            alert(`Comentário enviado!\nNome: ${name}\nComentário: ${comment}`);
            form.reset();
        });
    </script>
</body>
</html>
